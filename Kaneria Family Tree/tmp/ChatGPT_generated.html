<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Tree Builder</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f5f5f5; }
    header { background:#222; color:#fff; padding:10px; text-align:center; }
    .container { padding:20px; }
    .form { background:#fff; padding:15px; border-radius:10px; margin-bottom:20px; }
    input, select { padding:8px; margin:5px; width:200px; }
    button { padding:10px 15px; margin:5px; cursor:pointer; }
    .tree { display:flex; flex-wrap:wrap; gap:20px; }
    .card { background:#fff; padding:10px; border-radius:10px; width:150px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    .card img { width:80px; height:80px; border-radius:50%; object-fit:cover; }
  </style>
</head>
<body>

<header>
  <h2>Family Tree Builder</h2>
</header>

<div class="container">

  <div class="form">
    <h3>Add Member</h3>
    <input type="text" id="name" placeholder="Name" required />
    <select id="gender">
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>
    <input type="date" id="dob" />
    <input type="file" id="photo" />
    <input type="number" id="fatherId" placeholder="Father ID" />
    <input type="number" id="motherId" placeholder="Mother ID" />
    <input type="number" id="spouseId" placeholder="Spouse ID" />
    <br>
    <button onclick="addMember()">Add Member</button>
    <button onclick="exportHTML()">Generate Final Page</button>
  </div>

  <div class="tree" id="tree"></div>

</div>

<script>
let members = JSON.parse(localStorage.getItem('family')) || [];
let currentId = members.length ? Math.max(...members.map(m=>m.id)) + 1 : 1;

function addMember() {
  const name = document.getElementById('name').value;
  const gender = document.getElementById('gender').value;
  const dob = document.getElementById('dob').value;
  const fatherId = document.getElementById('fatherId').value;
  const motherId = document.getElementById('motherId').value;
  const spouseId = document.getElementById('spouseId').value;
  const file = document.getElementById('photo').files[0];

  if (!name) return alert('Name required');

  const reader = new FileReader();
  reader.onload = function() {
    const member = {
      id: currentId++,
      familyId: 'F' + Math.floor(Math.random()*100),
      name, gender, dob,
      fatherId, motherId, spouseId,
      photo: reader.result
    };

    members.push(member);
    localStorage.setItem('family', JSON.stringify(members));
    render();
  };

  if (file) reader.readAsDataURL(file);
  else {
    const member = {
      id: currentId++,
      familyId: 'F' + Math.floor(Math.random()*100),
      name, gender, dob,
      fatherId, motherId, spouseId,
      photo: ''
    };
    members.push(member);
    localStorage.setItem('family', JSON.stringify(members));
    render();
  }
}

function render() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  members.forEach(m => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${m.photo || 'https://via.placeholder.com/80'}" />
      <h4>${m.name}</h4>
      <p>ID: ${m.id}</p>
      <p>${m.gender}</p>
    `;

    tree.appendChild(div);
  });
}

function exportHTML() {
  let content = `<!DOCTYPE html><html><head><title>Family Tree</title>
  <style>
  body{font-family:Arial;background:#f5f5f5;padding:20px}
  .card{display:inline-block;margin:10px;padding:10px;background:#fff;border-radius:10px;text-align:center}
  img{width:80px;height:80px;border-radius:50%}
  </style>
  </head><body><h2>Family Tree</h2>`;

  members.forEach(m=>{
    content += `<div class='card'>
      <img src='${m.photo || ''}' />
      <h4>${m.name}</h4>
      <p>ID: ${m.id}</p>
    </div>`;
  });

  content += '</body></html>';

  const blob = new Blob([content], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'family-tree.html';
  a.click();
}

render();
</script>

</body>
</html>
