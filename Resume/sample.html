<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  	<title>Family Tree</title>
  <style>
    	.person {
      		margin: 20px;
      padding: 20px;
      		border: 1px solid #ccc;
      		border-radius: 5px;
    }
    	.parent {
      font-weight: bold;
    }
  </style>
</head>
<body>
  	<div class="person parent">
    		<h1>Gopal Kaneria</h1>
    		<p>Asha Kaneria</p>
    </div>
  	<div class="person child">
    		<h2>Shashank Kaneria</h2>
    </div>
  	<div class="person child">
    		<h2>Deepshikha Kaneria</h2>
    </div>
</body>
</html>
